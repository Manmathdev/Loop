<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a3625"/>
      <stop offset="100%" stop-color="#061f15"/>
    </linearGradient>
    <linearGradient id="loop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4f06a"/>
      <stop offset="100%" stop-color="#a3e635"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Loop/arrow mark -->
  <g transform="translate(256,256)">
    <!-- Main loop arc -->
    <path d="M-20,-130 C80,-130 130,-80 130,0 C130,80 80,130 0,130 C-60,130 -110,100 -125,50"
          stroke="url(#loop)" stroke-width="22" fill="none" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polyline points="-120,60 -130,50 -115,40"
              stroke="url(#loop)" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Inner subtle ring -->
    <circle cx="0" cy="0" r="60" stroke="url(#loop)" stroke-width="4" fill="none" opacity="0.3"/>
  </g>
</svg>
