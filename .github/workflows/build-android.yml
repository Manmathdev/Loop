name: Build Android APK

# Cloud-compiles a native Android APK from this Next.js app via Capacitor —
# no Android Studio or local SDK required. See ANDROID.md for the full guide.
on:
  workflow_dispatch: {}
  push:
    branches: [main, master]
    paths:
      - "capacitor.config.ts"
      - "mobile/**"
      - "resources/**"
      - ".github/workflows/build-android.yml"

# Run every JavaScript action on Node 24 now. Node 20 is fully removed from
# GitHub runners on Sept 16, 2026 — this opt-in keeps the workflow future-proof.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Point the app at your deployed backend (Settings → Secrets and variables →
  # Actions → Variables).
  LOOPBACK_APP_URL: ${{ vars.LOOPBACK_APP_URL }}

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5 # Node-24-native

      - name: Setup Node 22 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # No third-party setup-android action needed: ubuntu-latest already ships
      # the Android SDK with platforms;android-34 + build-tools;34.0.0 (the only
      # versions Capacitor 6 requires). We just wire ANDROID_HOME and accept
      # licenses as a safety net. (This replaces the buggy setup-android@v3 that
      # mis-parsed the package list.)
      - name: Configure preinstalled Android SDK
        shell: bash
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          echo "Installed SDK packages:"
          sdkmanager --list_installed | grep -E "platforms;android-3|build-tools;3" | head || true

      # Install the project's own dependencies FIRST. Capacitor's CLI resolves
      # packages (including @capacitor/android) via Node's normal module
      # resolution across the whole node_modules tree, and it runs a
      # peer-version consistency check across @capacitor/core, @capacitor/cli,
      # and the platform package. Skipping this step (or only installing a
      # hand-picked subset with --no-save) leaves node_modules in a partial
      # state, which is what caused "Could not find the android platform".
      - name: Install project dependencies
        run: npm ci

# Capacitor packages are already listed in package.json as real
      # dependencies, so `npm ci` above already installed a consistent,
      # fully-resolved node_modules tree for them. Only @capacitor/assets
      # (a one-off CLI tool for icon/splash generation) isn't in
      # package.json, so that's the only thing we install here.
      - name: Install Capacitor asset generator
        run: npm install --no-save @capacitor/assets@latest

      - name: Add Android platform (only if missing)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android/ already exists, skipping cap add"
          fi

      - name: Generate native icons & splash
        run: npx @capacitor/assets generate --android || true

      - name: Add share intent plugin
        shell: bash
        run: |
          PKG="android/app/src/main/java/com/loopback/app"
          mkdir -p "$PKG/plugins"
          cp mobile/plugins/share-intent/ShareIntentPlugin.java "$PKG/plugins/"
          cp mobile/plugins/share-intent/MainActivity.java "$PKG/"

          python3 <<'PYEOF'
import re
mf = "android/app/src/main/AndroidManifest.xml"
with open(mf) as f:
    xml = f.read()
share = '''          <intent-filter>
            <action android:name="android.intent.action.SEND" />
            <category android:name="android.intent.category.DEFAULT" />
            <data android:mimeType="text/plain" />
          </intent-filter>
'''
xml = re.sub(
    r'(<action android:name="android.intent.action.MAIN"/>.*?</intent-filter>)',
    r'\1\n' + share,
    xml,
    flags=re.DOTALL,
)
with open(mf, "w") as f:
    f.write(xml)
PYEOF

      - name: Sync web assets + plugins into native project
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: loopback-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        run: |
          echo "### ✅ APK ready" >> $GITHUB_STEP_SUMMARY
          echo "Download the **loopback-debug-apk** artifact from this run's page, then install it on your phone (enable 'Install unknown apps')." >> $GITHUB_STEP_SUMMARY
          if [ -z "$LOOPBACK_APP_URL" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ \`LOOPBACK_APP_URL\` is not set — the app will show the placeholder screen until you add it." >> $GITHUB_STEP_SUMMARY
          fi
