name: Build Android APK

# Cloud-compiles a native Android APK from this Next.js app via Capacitor —
# no Android Studio or local SDK required. See ANDROID.md for the full guide.
on:
  workflow_dispatch: {}
  push:
    branches: [main, master]
    paths:
      - "capacitor.config.ts"
      - "mobile/**"
      - "resources/**"
      - ".github/workflows/build-android.yml"

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      # Point the app at your deployed backend. Set under
      # Settings → Secrets and variables → Actions → Variables.
      LOOPBACK_APP_URL: ${{ vars.LOOPBACK_APP_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0

      - name: Install Capacitor + native plugins (no-save keeps package.json clean)
        run: |
          npm install --no-save @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6
          npm install --no-save @capacitor/app@6 @capacitor/haptics@6 @capacitor/browser@6 \
            @capacitor/network@6 @capacitor/status-bar@6 @capacitor/splash-screen@6
          npm install --no-save @capacitor/assets@latest

      - name: Add Android platform
        run: npx cap add android

      - name: Generate native icons & splash
        run: npx @capacitor/assets generate --android || true

      - name: Sync web assets into native project
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: loopback-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        run: |
          echo "### ✅ APK ready" >> $GITHUB_STEP_SUMMARY
          echo "Download the **loopback-debug-apk** artifact from this run's page, then install it on your phone (enable 'Install unknown apps')." >> $GITHUB_STEP_SUMMARY
          if [ -z "$LOOPBACK_APP_URL" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ \`LOOPBACK_APP_URL\` is not set — the app will show the placeholder screen until you add it." >> $GITHUB_STEP_SUMMARY
          fi
